name: TestFlight

# Push a build to TestFlight when a v* tag is pushed, or on manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  beta:
    # macos-latest avoids the frequently-saturated pinned macos-15 pool.
    # setup-xcode (latest-stable) picks the newest Xcode on whatever image
    # this resolves to; pin runs-on / xcode-version if a build needs a
    # specific SDK.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # fastlane depends on bundler < 3, so avoid Bundler 4.x.
          bundler: "2"

      # No Gemfile.lock is committed: it can only be generated on the dev's
      # macOS system Ruby 2.6, which pins gems (e.g. CFPropertyList 3.0.9) that
      # are incompatible with the CI runner's Ruby 3.3. Resolve fresh instead.
      - name: Install gems
        run: bundle install

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: bundle exec fastlane beta
