name: TestFlight

# Push a build to TestFlight when a v* tag is pushed, or on manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  beta:
    # Needs a macOS image whose Xcode ships the iOS SDK the project builds
    # against. Bump the runner image / Xcode version as Apple releases them.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: bundle exec fastlane beta
